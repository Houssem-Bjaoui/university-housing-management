<div class="container-fluid py-4">
  <h2 class="mb-4">Dashboard</h2>
  
  <div class="row g-4">
    <div class="col-md-4">
      <div class="card stat-card border-0 shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <h6 class="text-muted mb-2">Universities</h6>
              <h3 class="mb-0">{{ stats.universites }}</h3>
            </div>
            <div class="stat-icon bg-primary">
              <i class="bi bi-building text-white"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card stat-card border-0 shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <h6 class="text-muted mb-2">Foyers</h6>
              <h3 class="mb-0">{{ stats.foyers }}</h3>
            </div>
            <div class="stat-icon bg-success">
              <i class="bi bi-house-door text-white"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card stat-card border-0 shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <h6 class="text-muted mb-2">Blocs</h6>
              <h3 class="mb-0">{{ stats.blocs }}</h3>
            </div>
            <div class="stat-icon bg-info">
              <i class="bi bi-grid-3x3 text-white"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card stat-card border-0 shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <h6 class="text-muted mb-2">Chambres</h6>
              <h3 class="mb-0">{{ stats.chambres }}</h3>
            </div>
            <div class="stat-icon bg-warning">
              <i class="bi bi-door-closed text-white"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card stat-card border-0 shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <h6 class="text-muted mb-2">Students</h6>
              <h3 class="mb-0">{{ stats.etudiants }}</h3>
            </div>
            <div class="stat-icon bg-danger">
              <i class="bi bi-people text-white"></i>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card stat-card border-0 shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <h6 class="text-muted mb-2">Reservations</h6>
              <h3 class="mb-0">{{ stats.reservations }}</h3>
            </div>
            <div class="stat-icon bg-secondary">
              <i class="bi bi-calendar-check text-white"></i>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
