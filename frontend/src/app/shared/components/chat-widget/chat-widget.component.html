<!-- Chat Bubble Button -->
<div class="chat-bubble" [class.hidden]="isOpen" (click)="toggleChat()">
  <i class="bi bi-chat-dots-fill"></i>
</div>

<!-- Chat Window -->
<div class="chat-window" [class.open]="isOpen">
  <!-- Header -->
  <div class="chat-header">
    <div class="d-flex align-items-center">
      <i class="bi bi-robot me-2"></i>
      <span class="fw-bold">Virtual Assistant</span>
    </div>
    <button class="btn-close-chat" (click)="closeChat()" aria-label="Close">
      <i class="bi bi-x-lg"></i>
    </button>
  </div>

  <!-- Messages Area -->
  <div class="chat-messages">
    <div *ngFor="let message of messages" 
         class="message-wrapper"
         [class.user-message]="message.isUser"
         [class.bot-message]="!message.isUser">
      <div class="message-bubble">
        <div class="message-text">{{ message.text }}</div>
        <div class="message-time">
          {{ message.timestamp | date:'shortTime' }}
        </div>
      </div>
    </div>

    <!-- Loading indicator -->
    <div *ngIf="isLoading" class="message-wrapper bot-message">
      <div class="message-bubble">
        <div class="typing-indicator">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Quick Buttons -->
  <div class="quick-buttons" *ngIf="messages.length <= 1">
    <button 
      *ngFor="let button of quickButtons" 
      class="btn btn-sm btn-outline-primary quick-btn"
      (click)="sendQuickMessage(button)">
      {{ button }}
    </button>
  </div>

  <!-- Input Area -->
  <div class="chat-input">
    <input 
      type="text" 
      class="form-control" 
      placeholder="Type your message..."
      [(ngModel)]="userInput"
      (keypress)="onKeyPress($event)"
      [disabled]="isLoading">
    <button 
      class="btn btn-primary btn-send" 
      (click)="sendMessage()"
      [disabled]="!userInput.trim() || isLoading">
      <i class="bi bi-send-fill"></i>
    </button>
  </div>
</div>
